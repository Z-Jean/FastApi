# 推送到 main 分支时，自动同步代码到阿里云 ECS 并执行 deploy.sh
name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync backend to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude '*.pyc' \
            backend/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/fullstack/backend/"

      - name: Sync frontend to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '.env.production' \
            frontend/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/fullstack/frontend/"

      - name: Sync deploy scripts
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            deploy/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/fullstack/deploy/"

      - name: Run deploy on server
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "chmod +x /var/www/fullstack/deploy/deploy.sh && bash /var/www/fullstack/deploy/deploy.sh"

      - name: Health check
        run: |
          sleep 5
          curl -fsS "http://${{ secrets.SERVER_HOST }}/" -o /dev/null
          echo "首页可访问"
